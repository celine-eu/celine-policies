name: Build and publish Keycloak image

on:
  push:
    paths:
      - "keycloak/version.txt"
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "tag=$(cat keycloak/version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: keycloak
          push: true
          tags: |
            ghcr.io/celine-eu/keycloak:${{ steps.version.outputs.tag }}
            ghcr.io/celine-eu/keycloak:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
