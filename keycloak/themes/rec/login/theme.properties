# REC Keycloak Login Theme
# Extends the base Keycloak theme with custom styling

parent=keycloak
import=common/keycloak

styles=css/login.css

# Internationalization
locales=en,it

# Brand name — set BRAND_NAME env var to override the logo text
brandName=${env.BRAND_NAME:CELINE}

# Footer links — set TERMS_URL / PRIVACY_URL env vars at runtime
# Links are hidden in the template when left as the default '#'
termsUrl=${env.TERMS_URL:#}
privacyUrl=${env.PRIVACY_URL:#}
